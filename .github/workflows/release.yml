name: Build and Release CleanSweep Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: CleanSweep.app
            asset_name: CleanSweep-macOS.zip
          - os: windows-latest
            artifact_name: dist/CleanSweep.exe
            asset_name: CleanSweep-Windows.exe

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller -r requirements.txt

    - name: Build Executable (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --name="CleanSweep" --add-data="templates:templates" --noconsole --onefile app.py
        cd dist
        zip -r ../${{ matrix.asset_name }} CleanSweep.app

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --name="CleanSweep" --add-data="templates;templates" --noconsole --onefile app.py
        powershell Copy-Item -Path "dist\CleanSweep.exe" -Destination "..\\${{ matrix.asset_name }}"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Flatten folder structure
      run: |
        mkdir release_assets
        find artifacts -type f -exec cp {} release_assets/ \;
        ls -la release_assets/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
